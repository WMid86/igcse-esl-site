<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGCSE 0511 Speaking Exam Guide</title>
<!-- Include global styles for unified colour palette -->
<link rel="stylesheet" href="styles.css">
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2563eb;--primary-light:#dbeafe;--primary-dark:#1e40af;
  --accent:#f59e0b;--accent-light:#fef3c7;
  --success:#10b981;--success-light:#d1fae5;
  --danger:#ef4444;--danger-light:#fee2e2;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;
  --gray-500:#6b7280;--gray-700:#374151;--gray-900:#111827;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 14px rgba(0,0,0,.06);
  --shadow-lg:0 4px 24px rgba(0,0,0,.1);
  --transition:0.25s ease;
}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',system-ui,-apple-system,sans-serif;background:linear-gradient(180deg,#f8fbff 0%,#f9fafb 18%,#f9fafb 100%);color:var(--gray-900);line-height:1.65}

/* ===== NAV ===== */
.navbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--gray-200);padding:0 1.5rem}
.nav-inner{max-width:1200px;margin:auto;display:flex;align-items:center;justify-content:space-between;height:60px;gap:1rem}
.nav-brand{font-weight:700;font-size:1.05rem;color:var(--primary-dark);white-space:nowrap}
.nav-links{display:flex;gap:.25rem;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.nav-links::-webkit-scrollbar{display:none}
.nav-link{padding:.45rem .8rem;border-radius:8px;font-size:.82rem;font-weight:500;color:var(--gray-700);cursor:pointer;white-space:nowrap;transition:var(--transition);border:none;background:none}
.nav-link:hover,.nav-link.active{background:var(--primary-light);color:var(--primary-dark)}
.lang-toggle{display:flex;border:2px solid var(--primary);border-radius:8px;overflow:hidden;flex-shrink:0}
.lang-btn{padding:.35rem .7rem;font-size:.8rem;font-weight:600;border:none;cursor:pointer;transition:var(--transition);background:white;color:var(--primary)}
.lang-btn.active{background:var(--primary);color:white}

/* ===== LAYOUT ===== */
.container{max-width:1100px;margin:auto;padding:2rem 1.5rem 4rem}
.section{display:none;animation:fadeUp .4s ease}
.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ===== TYPOGRAPHY ===== */
h1{font-size:2.2rem;font-weight:800;line-height:1.2;color:var(--gray-900)}
h2{font-size:1.6rem;font-weight:700;margin-bottom:1rem;color:var(--gray-900)}
h3{font-size:1.15rem;font-weight:700;margin-bottom:.5rem;color:var(--gray-900)}
.subtitle{font-size:1.1rem;color:var(--gray-500);margin-top:.5rem;font-weight:400}

/* ===== CARDS ===== */
.card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:1.5rem;transition:var(--transition)}
.card:hover{box-shadow:var(--shadow-lg)}
.card-grid{display:grid;gap:1.25rem}
.card-grid-2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.card-grid-3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.card-grid-4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}

/* ===== ICON CIRCLES ===== */
.icon-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.icon-blue{background:var(--primary-light);color:var(--primary)}
.icon-amber{background:var(--accent-light);color:#b45309}
.icon-green{background:var(--success-light);color:#047857}
.icon-red{background:var(--danger-light);color:#b91c1c}

/* ===== BADGES ===== */
.badge{display:inline-block;padding:.2rem .6rem;border-radius:20px;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.badge-green{background:var(--success-light);color:#047857}
.badge-gray{background:var(--gray-200);color:var(--gray-500)}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.4rem;border-radius:8px;font-size:.95rem;font-weight:600;border:none;cursor:pointer;transition:var(--transition)}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:var(--primary-dark)}

/* ===== TIMELINE ===== */
.timeline{position:relative;padding-left:2.5rem}
.timeline::before{content:'';position:absolute;left:15px;top:0;bottom:0;width:3px;background:var(--gray-200);border-radius:3px}
.timeline-item{position:relative;margin-bottom:1.5rem}
.timeline-dot{position:absolute;left:-2.5rem;top:.2rem;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:white;z-index:1}
.timeline-dot.blue{background:var(--primary)}
.timeline-dot.amber{background:var(--accent)}
.timeline-dot.green{background:var(--success)}

/* ===== ACCORDION ===== */
.accordion{border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;margin-bottom:.75rem;background:white}
.accordion-header{display:flex;align-items:center;gap:.75rem;padding:1rem 1.25rem;cursor:pointer;font-weight:600;font-size:1rem;transition:var(--transition);user-select:none}
.accordion-header:hover{background:var(--gray-50)}
.accordion-arrow{margin-left:auto;transition:transform .25s ease;font-size:.75rem;color:var(--gray-500)}
.accordion.open .accordion-arrow{transform:rotate(180deg)}
.accordion-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.accordion.open .accordion-body{max-height:2000px}
.accordion-content{padding:0 1.25rem 1.25rem}

/* ===== TABS ===== */
.tab-bar{display:flex;gap:.25rem;border-bottom:2px solid var(--gray-200);margin-bottom:1.25rem;overflow-x:auto}
.tab-btn{padding:.6rem 1rem;font-size:.85rem;font-weight:600;border:none;background:none;cursor:pointer;color:var(--gray-500);border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--transition);white-space:nowrap}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-pane{display:none;animation:fadeUp .3s ease}
.tab-pane.active{display:block}

/* ===== PHRASE TABLE ===== */
.phrase-table{width:100%;border-collapse:separate;border-spacing:0;font-size:.9rem}
.phrase-table th{background:var(--primary-light);color:var(--primary-dark);padding:.6rem .8rem;text-align:left;font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:.3px}
.phrase-table th:first-child{border-radius:8px 0 0 0}
.phrase-table th:last-child{border-radius:0 8px 0 0}
.phrase-table td{padding:.55rem .8rem;border-bottom:1px solid var(--gray-100)}
.phrase-table tr:last-child td{border-bottom:none}
.phrase-table tr:hover td{background:var(--gray-50)}

/* ===== TWO COL ===== */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}

/* ===== EXAMPLE ANNOTATION ===== */
.example-block{background:var(--gray-50);border-left:4px solid var(--primary);border-radius:0 var(--radius) var(--radius) 0;padding:1rem 1.25rem;margin:.75rem 0;font-size:.93rem;line-height:1.7}
.annotation{display:inline-block;background:var(--accent-light);color:#92400e;font-size:.72rem;font-weight:600;padding:.15rem .45rem;border-radius:4px;margin-left:.3rem;vertical-align:middle}

/* ===== CHECKLIST ===== */
.checklist{list-style:none}
.checklist li{display:flex;align-items:flex-start;gap:.6rem;padding:.5rem 0;font-size:.95rem}
.check-box{width:22px;height:22px;border:2px solid var(--gray-300);border-radius:5px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);margin-top:2px}
.check-box.checked{background:var(--success);border-color:var(--success);color:white}
.check-box.checked::after{content:'✓';font-size:.75rem;font-weight:700}

/* ===== ALERT BOXES ===== */
.alert{padding:1rem 1.25rem;border-radius:var(--radius);font-size:.9rem;display:flex;align-items:flex-start;gap:.75rem;margin:.75rem 0}
.alert-success{background:var(--success-light);color:#065f46}
.alert-warning{background:var(--accent-light);color:#92400e}
.alert-danger{background:var(--danger-light);color:#991b1b}
.alert-info{background:var(--primary-light);color:var(--primary-dark)}

/* ===== CONFIDENCE PANEL ===== */
.confidence-panel{background:linear-gradient(135deg,#ede9fe,#dbeafe);border-radius:var(--radius);padding:1.5rem;text-align:center}
.confidence-panel h3{color:var(--primary-dark)}

/* ===== HERO ===== */
.hero{text-align:center;padding:3rem 1rem 2rem}
.hero h1{font-size:2.4rem}
.hero .subtitle{font-size:1.15rem;max-width:500px;margin:0.5rem auto 0}
.journey-steps{display:flex;align-items:center;justify-content:center;gap:.5rem;flex-wrap:wrap;margin-top:2rem}
.journey-step{display:flex;align-items:center;gap:.5rem;background:white;padding:.6rem 1rem;border-radius:10px;box-shadow:var(--shadow);font-size:.88rem;font-weight:600}
.journey-arrow{color:var(--gray-300);font-size:1.2rem}

/* ===== UPGRADE BOX ===== */
.upgrade-box{background:linear-gradient(135deg,#fef3c7,#fff7ed);border-radius:var(--radius);padding:1.25rem;margin-top:1rem}
.upgrade-row{display:flex;align-items:center;gap:.75rem;padding:.35rem 0;font-size:.9rem}
.upgrade-row .arrow{color:var(--accent);font-weight:700}

/* ===== RESPONSIVE ===== */
@media(max-width:860px){
  .nav-links{display:none}
  .mobile-menu-btn{display:flex !important}
  .nav-links.open{display:flex;flex-direction:column;position:absolute;top:60px;left:0;right:0;background:white;padding:1rem;border-bottom:1px solid var(--gray-200);box-shadow:var(--shadow)}
}
.mobile-menu-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border:none;background:none;font-size:1.4rem;cursor:pointer;color:var(--gray-700)}

.hero-shell{position:relative;margin-bottom:2rem}
.hero-panel{background:linear-gradient(135deg,#eef4ff 0%,#ffffff 42%,#f5f3ff 100%);border:1px solid rgba(37,99,235,.08);border-radius:24px;padding:2.2rem 1.4rem 1.6rem;box-shadow:0 16px 42px rgba(37,99,235,.08);overflow:hidden}
.hero-panel::before,.hero-panel::after{content:'';position:absolute;border-radius:50%;filter:blur(8px);opacity:.4;pointer-events:none}
.hero-panel::before{width:180px;height:180px;background:#dbeafe;top:-60px;right:-40px}
.hero-panel::after{width:150px;height:150px;background:#ede9fe;left:-50px;bottom:-55px}
.hero-kicker{display:inline-flex;align-items:center;gap:.45rem;padding:.4rem .8rem;border-radius:999px;background:white;border:1px solid var(--gray-200);font-size:.84rem;font-weight:700;color:var(--primary-dark);box-shadow:var(--shadow)}
.hero-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:1.25rem;align-items:stretch;margin-top:1.35rem}
.stage-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.85rem;margin-top:1.35rem}
.stage-card{background:rgba(255,255,255,.85);backdrop-filter:blur(4px);border:1px solid var(--gray-200);border-radius:16px;padding:1rem;box-shadow:var(--shadow);transition:var(--transition)}
.stage-card:hover{transform:translateY(-2px)}
.stage-icon{font-size:1.2rem;margin-bottom:.55rem}
.stage-title{font-size:.92rem;font-weight:700;margin-bottom:.2rem}
.stage-meta{font-size:.8rem;color:var(--gray-500)}
.exam-glance{background:white;border-radius:18px;padding:1.15rem;border:1px solid var(--gray-200);box-shadow:var(--shadow);display:flex;flex-direction:column;justify-content:space-between}
.glance-title{font-size:1rem;font-weight:700;margin-bottom:.7rem}
.glance-list{display:grid;gap:.6rem}
.glance-item{display:flex;align-items:center;justify-content:space-between;gap:.75rem;padding:.65rem .8rem;border-radius:12px;background:var(--gray-50)}
.glance-left{display:flex;align-items:center;gap:.65rem;font-size:.92rem;font-weight:600}
.glance-right{font-size:.78rem;color:var(--gray-500)}
.quick-help{margin-top:1.1rem;padding:.9rem 1rem;border-radius:14px;background:linear-gradient(135deg,#eff6ff,#ecfeff);border:1px solid #dbeafe}
.progress-row{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1rem}
.progress-pill{display:inline-flex;align-items:center;gap:.45rem;padding:.38rem .75rem;border-radius:999px;background:white;border:1px solid var(--gray-200);font-size:.82rem;font-weight:700;color:var(--gray-700);box-shadow:var(--shadow)}
.pretty-card{border:1px solid rgba(37,99,235,.07);border-radius:18px;box-shadow:0 10px 30px rgba(17,24,39,.05)}
@media(max-width:860px){.hero-grid{grid-template-columns:1fr}.hero-panel{padding:1.6rem 1rem 1.2rem}}


/* ===== PRACTICE MODE ===== */
.practice-toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:.75rem;margin:1rem 0 1.2rem}
.practice-select{padding:.7rem .9rem;border:1px solid var(--gray-300);border-radius:10px;background:white;font-size:.94rem;color:var(--gray-900);min-width:240px}
.btn-secondary{background:white;color:var(--primary-dark);border:1px solid var(--gray-300)}
.btn-secondary:hover{border-color:var(--primary);background:var(--primary-light)}
.btn-ghost{background:transparent;color:var(--gray-700);border:1px dashed var(--gray-300)}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary-dark);background:#fff}
.practice-stage-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.6rem;margin-bottom:1.2rem}
.practice-stage-btn{padding:.85rem .9rem;border-radius:14px;border:1px solid var(--gray-200);background:white;box-shadow:var(--shadow);cursor:pointer;transition:var(--transition);text-align:left}
.practice-stage-btn:hover{transform:translateY(-2px);border-color:var(--primary)}
.practice-stage-btn.active{background:linear-gradient(135deg,#eff6ff,#eef2ff);border-color:var(--primary)}
.practice-stage-title{font-size:.88rem;font-weight:700}
.practice-stage-meta{font-size:.76rem;color:var(--gray-500);margin-top:.25rem}
.practice-layout{display:grid;grid-template-columns:1.1fr .9fr;gap:1.25rem;align-items:start}
.practice-card{background:white;border-radius:18px;padding:1.35rem;box-shadow:var(--shadow);border:1px solid rgba(37,99,235,.08)}
.practice-card h3{margin-bottom:.7rem}
.practice-card ul,.practice-card ol{padding-left:1.2rem}
.practice-card li{margin:.35rem 0}
.mock-stage-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.25rem .65rem;border-radius:999px;font-size:.72rem;font-weight:700}
.mock-stage-badge.assessed{background:var(--success-light);color:#047857}
.mock-stage-badge.not-assessed{background:var(--gray-200);color:var(--gray-700)}
.mock-question{padding:.9rem 1rem;border-radius:14px;background:var(--gray-50);border:1px solid var(--gray-200);margin:.65rem 0}
.mock-question-zh{font-size:.85rem;color:var(--gray-500);margin-top:.25rem}
.mock-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin:.9rem 0}
.mock-option{padding:.85rem 1rem;border-radius:14px;background:linear-gradient(135deg,#f8fbff,#ffffff);border:1px solid var(--gray-200)}
.mock-option-label{font-size:.74rem;color:var(--gray-500);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:.25rem}
.practice-side-stack{display:grid;gap:1rem}
.timer-shell{background:linear-gradient(135deg,#eff6ff,#eef2ff);border-radius:18px;padding:1.1rem;border:1px solid rgba(37,99,235,.12)}
.timer-display{font-size:2.5rem;line-height:1;font-weight:800;color:var(--primary-dark);margin:.5rem 0 .8rem}
.timer-subtext{font-size:.86rem;color:var(--gray-500);margin-bottom:.85rem}
.timer-controls{display:flex;flex-wrap:wrap;gap:.55rem}
.timer-status{font-size:.82rem;font-weight:700;color:var(--gray-700);margin-top:.75rem}
.mic-status{display:inline-flex;align-items:center;gap:.45rem;padding:.35rem .7rem;border-radius:999px;background:var(--gray-100);font-size:.8rem;font-weight:700;color:var(--gray-700)}
.mic-status.live{background:var(--danger-light);color:#991b1b}
.mic-dot{width:9px;height:9px;border-radius:50%;background:currentColor}
.transcript-shell{background:white;border-radius:18px;padding:1.1rem;border:1px solid var(--gray-200);box-shadow:var(--shadow)}
.transcript-box{min-height:240px;background:var(--gray-50);border:1px dashed var(--gray-300);border-radius:14px;padding:1rem;white-space:pre-wrap;font-size:.95rem;line-height:1.7}
.transcript-placeholder{color:var(--gray-500)}
.transcript-interim{color:var(--primary-dark);opacity:.75}
.word-count{font-size:.82rem;color:var(--gray-500)}
.practice-note{margin-top:.85rem;padding:.85rem 1rem;border-radius:14px;background:linear-gradient(135deg,#fff7ed,#fffbeb);border:1px solid #fde68a;font-size:.9rem;color:#92400e}
.inline-help{font-size:.88rem;color:var(--gray-500)}
@media(max-width:900px){
  .practice-layout{grid-template-columns:1fr}
}
@media(max-width:640px){
  .mock-card-grid{grid-template-columns:1fr}
  .practice-select{min-width:100%}
  .practice-toolbar{align-items:stretch}
}

</style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
  <div class="nav-inner">
    <div class="nav-brand">📘 IGCSE 0511</div>
    <button class="mobile-menu-btn" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">☰</button>
    <div class="nav-links" id="navLinks"></div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('zh')">中文</button>
    </div>
  </div>
</nav>

<!-- ===== MAIN ===== -->
<div class="container" id="app"></div>

<script>

const T = {

      {

        content: {
          en:`<p style="margin-bottom:.75rem">The warm-up is <strong>not graded</strong>, so there is no need to worry. It comes after the short introduction and helps you relax and get used to speaking English with the examiner.</p>

<ul style="padding-left:1.2rem;margin-top:.5rem"><li>Answer in full sentences, not just "yes" or "no."</li><li>If you do not understand a question, it is fine to say "Sorry, could you repeat that?"</li><li>Think of this as a friendly conversation, not a test.</li></ul>`,
          zh:`<p style="margin-bottom:.75rem">热身环节<strong>不计分</strong>，所以不需要紧张。它在简短介绍之后进行，目的是帮助你放松，适应用英语和考官交流。</p>

      {
        heading: { en:'🎤 Part 1 — Interview', zh:'🎤 第一部分——面试' },
        content: {
          en:`<p style="margin-bottom:.75rem">The examiner will ask questions about one topic. Your goal is to give <strong>developed answers</strong> — go beyond the basic answer.</p>
<h3 style="margin:1rem 0 .5rem">Use the A-R-E structure</h3>
<div class="card" style="margin-bottom:1rem;border-left:4px solid var(--primary)">
<strong>A</strong>nswer the question → <strong>R</strong>eason (explain why) → <strong>E</strong>xample (give a real-life detail)
</div>
<h3>Weak vs Strong Responses</h3>
<div class="two-col" style="margin-top:.5rem">
<div class="alert alert-danger">❌ <strong>Weak:</strong> "I like sports."<br><em>— too short, no detail</em></div>
<div class="alert alert-success">✅ <strong>Strong:</strong> "I enjoy playing basketball because it keeps me active and I love being part of a team. For example, I play with my school team every weekend and we often enter local competitions."<br><em>— answer + reason + example</em></div>
</div>
<div class="alert alert-warning" style="margin-top:.75rem">⏰ <strong>Key tip:</strong> If you give a short answer, the examiner may have to ask extra questions. If you develop your answers, the conversation flows naturally and you demonstrate stronger language skills.</div>`,
          zh:`<p style="margin-bottom:.75rem">考官会就一个话题提问。你的目标是给出<strong>有深度的回答</strong>——不要只回答表面内容。</p>
<h3 style="margin:1rem 0 .5rem">使用 A-R-E 结构</h3>
<div class="card" style="margin-bottom:1rem;border-left:4px solid var(--primary)">
<strong>A</strong>nswer 回答问题 → <strong>R</strong>eason 解释原因 → <strong>E</strong>xample 举出具体例子
</div>
<h3>弱回答 vs 强回答</h3>
<div class="two-col" style="margin-top:.5rem">
<div class="alert alert-danger">❌ <strong>弱回答：</strong>"I like sports."（我喜欢运动。）<br><em>——太简短，没有细节</em></div>
<div class="alert alert-success">✅ <strong>强回答：</strong>"I enjoy playing basketball because it keeps me active and I love being part of a team. For example, I play with my school team every weekend and we often enter local competitions."<br><em>——回答 + 原因 + 例子</em></div>
</div>
<div class="alert alert-warning" style="margin-top:.75rem">⏰ <strong>关键提示：</strong>如果你的回答太短，考官可能需要追问更多问题。如果你展开回答，对话会更自然，也能展示更强的语言能力。</div>`

        heading: { en:'📋 Part 2 — Short Talk', zh:'📋 第二部分——简短发言' },
        content: {
          en:`<h3>During your 1-minute preparation</h3>
<div class="alert alert-warning">📝 <strong>No written notes:</strong> use this minute to organise your ideas in your head, not on paper.</div>
<ol style="padding-left:1.2rem;margin:.5rem 0">
<li>Read the card carefully — understand both options.</li>
<li>Think of 1–2 good points for <em>each</em> option.</li>
<li>Decide which option you prefer.</li>
<li>Plan your reason for choosing it.</li>
</ol>
<h3 style="margin-top:1rem">Speaking Framework</h3>
<div class="card" style="border-left:4px solid var(--success);margin:.5rem 0 1rem">
Introduce Option 1 → Explain its advantage/disadvantage → Introduce Option 2 → Compare both → State your choice → Justify why
</div>
<div class="alert alert-info">💡 <strong>Filling your time:</strong> If you finish early, add another reason, give an extra example, or explain what other people might think. Avoid just stopping — keep speaking naturally until the examiner signals you to stop.</div>
<h3 style="margin-top:1rem">Example topic (not a real exam question)</h3>
<div class="example-block">
<em>"Your school wants to organise a special activity day. You can choose between a sports day or a science fair. Talk about both options and say which you think is better."</em>
</div>`,
          zh:`<h3>1分钟准备时间该怎么做</h3>
<div class="alert alert-warning">📝 <strong>不能写笔记：</strong>这1分钟要在脑中整理思路，而不是写下来。</div>
<ol style="padding-left:1.2rem;margin:.5rem 0">
<li>仔细阅读卡片——理解两个选项。</li>
<li>为<em>每个</em>选项想1–2个优点。</li>
<li>决定你更喜欢哪个选项。</li>
<li>计划你选择的理由。</li>
</ol>
<h3 style="margin-top:1rem">发言框架</h3>
<div class="card" style="border-left:4px solid var(--success);margin:.5rem 0 1rem">
介绍选项1 → 解释其优缺点 → 介绍选项2 → 比较两者 → 说出你的选择 → 解释原因
</div>
<div class="alert alert-info">💡 <strong>如何充分利用时间：</strong>如果你说完了还有时间，可以补充一个理由、多举一个例子，或者说说其他人可能怎么想。不要突然停下来——自然地继续说，直到考官示意你停止。</div>
<h3 style="margin-top:1rem">示例话题（非真实考题）</h3>
<div class="example-block">
<em>"你的学校想组织一个特别活动日。你可以选择运动会或科学展。谈谈这两个选项，说说你认为哪个更好。"</em>
</div>`

          en:`<p style="margin-bottom:.75rem">Part 3 is a <strong>deeper conversation</strong> related to the Part 2 topic. The examiner asks broader questions and you need to give extended, thoughtful answers.</p>
<h3>How to expand your answers</h3>
<ul style="padding-left:1.2rem;margin:.5rem 0 1rem">
<li><strong>Explain</strong> your idea clearly</li>
<li><strong>Justify</strong> with reasons</li>
<li><strong>Compare</strong> different viewpoints</li>
<li><strong>Reflect</strong> — consider advantages and disadvantages</li>
<li><strong>Give examples</strong> from daily life</li>
</ul>
<h3>Basic → Stronger Answer</h3>
<div class="two-col" style="margin-top:.5rem">

          zh:`<p style="margin-bottom:.75rem">第三部分是与第二部分话题相关的<strong>更深入的对话</strong>。考官会提出更广泛的问题，你需要给出更详细、更有思考深度的回答。</p>

<li><strong>比较</strong>不同观点</li>

<div class="alert alert-success">✅ <strong>更强回答：</strong>"Regular exercise is beneficial because it improves both physical and mental health. For instance, playing a team sport helps people stay fit while also teaching them how to cooperate and communicate with others."</div>
</div>`

function formatTime(totalSeconds) {
  const mins = Math.floor(totalSeconds / 60);
  const secs = totalSeconds % 60;
  return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
}
function ensurePracticeTimer() {
  if (practiceState.timerRemaining == null) {
    practiceState.timerRemaining = getStageDuration(practiceState.stageKey);
  }
}
function updatePracticeTimerUI() {
  const display = document.getElementById('practiceTimerDisplay');
  const status = document.getElementById('practiceTimerStatus');
  const stageHelp = document.getElementById('practiceTimerHelp');
  if (!display || !status || !stageHelp) return;
  ensurePracticeTimer();
  display.textContent = formatTime(Math.max(0, practiceState.timerRemaining));
  stageHelp.textContent = `${getStageLabel(practiceState.stageKey)} · ${lang==='en' ? 'suggested time' : '建议时间'}`;
  status.textContent = practiceState.timerRemaining === 0
    ? T.practice.timerDone[lang]
    : (practiceState.timerRunning ? T.practice.timerRunning[lang] : T.practice.timerReady[lang]);
}
function stopPracticeTimer() {
  if (practiceTimerInterval) clearInterval(practiceTimerInterval);
  practiceTimerInterval = null;
  practiceState.timerRunning = false;
  savePracticeState();
  updatePracticeTimerUI();
}
function startPracticeTimer() {
  ensurePracticeTimer();
  if (practiceTimerInterval) clearInterval(practiceTimerInterval);
  practiceState.timerRunning = true;
  updatePracticeTimerUI();
  savePracticeState();
  practiceTimerInterval = setInterval(() => {
    if (practiceState.timerRemaining > 0) {
      practiceState.timerRemaining -= 1;
      savePracticeState();
      updatePracticeTimerUI();
    } else {
      stopPracticeTimer();
    }
  }, 1000);
}
function resetPracticeTimer() {
  practiceState.timerRemaining = getStageDuration(practiceState.stageKey);
  practiceState.timerRunning = false;
  if (practiceTimerInterval) clearInterval(practiceTimerInterval);
  practiceTimerInterval = null;
  savePracticeState();
  updatePracticeTimerUI();
}
function setPracticeStage(stageKey) {
  practiceState.stageKey = stageKey;
  practiceState.timerRemaining = getStageDuration(stageKey);
  practiceState.feedback = '';
  stopPracticeTimer();
  savePracticeState();
  renderSection(7);
}
function nextPracticeStage() {
  const currentIndex = practiceStageOrder.indexOf(practiceState.stageKey);
  const nextKey = practiceStageOrder[Math.min(currentIndex + 1, practiceStageOrder.length - 1)];
  setPracticeStage(nextKey);
}
function setPracticeSet(index) {
  practiceState.setIndex = Number(index) || 0;
  practiceState.stageKey = 'warmup';
  practiceState.timerRemaining = getStageDuration('warmup');
  practiceState.feedback = '';
  stopPracticeTimer();
  savePracticeState();
  renderSection(7);
}
function randomPracticeSet() {
  const next = Math.floor(Math.random() * PRACTICE_BANK.length);
  setPracticeSet(next);
}
function getSpeechCtor() {
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}
function updatePracticeTranscriptUI() {
  const transcript = document.getElementById('practiceTranscript');
  const words = document.getElementById('practiceWordCount');
  const status = document.getElementById('practiceMicStatus');
  const feedback = document.getElementById('practiceFeedback');
  if (transcript) {
    const combined = [practiceState.finalTranscript, practiceState.interimTranscript].filter(Boolean).join(' ').trim();
    if (!combined) {
      transcript.innerHTML = `<span class="transcript-placeholder">${T.practice.transcriptPlaceholder[lang]}</span>`;
    } else {
      transcript.innerHTML = `${practiceState.finalTranscript ? practiceState.finalTranscript.replace(/</g,'&lt;') : ''}${practiceState.interimTranscript ? ` <span class="transcript-interim">${practiceState.interimTranscript.replace(/</g,'&lt;')}</span>` : ''}`;
    }
  }
  if (words) {
    const count = ((practiceState.finalTranscript + ' ' + practiceState.interimTranscript).trim().match(/\b\S+\b/g) || []).length;
    words.textContent = `${T.practice.wordCount[lang]}: ${count}`;
  }
  if (status) {
    const supported = !!getSpeechCtor();
    status.className = 'mic-status' + (practiceState.micActive ? ' live' : '');
    status.innerHTML = `<span class="mic-dot"></span>${supported ? (practiceState.micActive ? T.practice.micListening[lang] : T.practice.micReady[lang]) : T.practice.micUnsupported[lang]}`;
  }
  if (feedback) feedback.textContent = practiceState.feedback || T.practice.micPermission[lang];
}
function ensureRecognition() {
  const Ctor = getSpeechCtor();
  if (!Ctor) return null;
  if (practiceRecognition) return practiceRecognition;
  practiceRecognition = new Ctor();
  practiceRecognition.continuous = true;
  practiceRecognition.interimResults = true;
  practiceRecognition.lang = 'en-US';
  practiceRecognition.onresult = (event) => {
    let finalText = '';
    let interimText = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalText += `${t} `;
      else interimText += t;
    }
    if (finalText) {
      practiceState.finalTranscript = `${practiceState.finalTranscript} ${finalText}`.replace(/\s+/g, ' ').trim();
    }
    practiceState.interimTranscript = interimText.trim();
    practiceState.feedback = T.practice.micPermission[lang];
    savePracticeState();
    updatePracticeTranscriptUI();
  };
  practiceRecognition.onstart = () => {
    practiceState.micActive = true;
    practiceState.feedback = T.practice.micListening[lang];
    updatePracticeTranscriptUI();
    savePracticeState();
  };
  practiceRecognition.onerror = (event) => {
    practiceState.micActive = false;
    practiceState.feedback = `${lang==='en' ? 'Microphone issue' : '麦克风问题'}: ${event.error}`;
    practiceState.interimTranscript = '';
    updatePracticeTranscriptUI();
    savePracticeState();
  };
  practiceRecognition.onend = () => {
    practiceState.micActive = false;
    practiceState.interimTranscript = '';
    updatePracticeTranscriptUI();
    savePracticeState();
  };
  return practiceRecognition;
}
function startPracticeMic() {
  const rec = ensureRecognition();
  if (!rec) {
    practiceState.feedback = T.practice.micUnsupported[lang];
    updatePracticeTranscriptUI();
    return;
  }
  practiceState.feedback = T.practice.micPermission[lang];
  try { rec.start(); } catch (err) { practiceState.feedback = err.message || String(err); }
  updatePracticeTranscriptUI();
}
function stopPracticeMic() {
  if (practiceRecognition) {
    try { practiceRecognition.stop(); } catch (err) {}
  }
  practiceState.micActive = false;
  practiceState.interimTranscript = '';
  updatePracticeTranscriptUI();
  savePracticeState();
}
function clearPracticeTranscript() {
  practiceState.finalTranscript = '';
  practiceState.interimTranscript = '';
  practiceState.feedback = '';
  savePracticeState();
  updatePracticeTranscriptUI();
}
async function copyPracticeTranscript() {
  const text = [practiceState.finalTranscript, practiceState.interimTranscript].filter(Boolean).join(' ').trim();
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    practiceState.feedback = T.practice.copied[lang];
  } catch (err) {
    practiceState.feedback = lang==='en' ? 'Copy failed in this browser.' : '此浏览器中复制失败。';
  }
  updatePracticeTranscriptUI();
}

    <div class="progress-row"><span class="progress-pill">${lang==='en'?'Section 6 of 8':'第 6 / 8 部分'}</span></div>
    <h2>${d.title[lang]}</h2>
    <p class="subtitle" style="margin-bottom:1.25rem">${d.subtitle[lang]}</p>
    <div class="two-col">
      <div class="card" style="border-top:4px solid var(--success)">
        <h3>${d.tipsTitle[lang]}</h3>
        <ul style="list-style:none;margin-top:.5rem">${tipsList}</ul>
      </div>
      <div class="card" style="border-top:4px solid var(--danger)">
        <h3>${d.mistakesTitle[lang]}</h3>
        <ul style="list-style:none;margin-top:.5rem">${mistakesList}</ul>
      </div>
    </div>`;
}

// ---------- REVISION ----------
function renderRevision() {
  const d = T.revision;
  const mapHTML = d.mapSteps[lang].map((s,i) =>
    `<div style="display:flex;align-items:center;gap:.6rem;padding:.4rem 0"><span style="background:var(--primary);color:white;width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0">${i+1}</span><span>${s}</span></div>`
  ).join('');
  const checkHTML = d.checkItems[lang].map((item, i) =>
    `<li><span class="check-box" data-idx="${i}"></span><span>${item}</span></li>`
  ).join('');
  return `
    <div class="progress-row"><span class="progress-pill">${lang==='en'?'Section 7 of 8':'第 7 / 8 部分'}</span></div>
    <h2>${d.title[lang]}</h2>
    <p class="subtitle" style="margin-bottom:1.25rem">${d.subtitle[lang]}</p>
    <div class="card" style="margin-bottom:1.25rem">
      <h3>${d.mapTitle[lang]}</h3>
      <div style="margin-top:.5rem">${mapHTML}</div>
    </div>
    <div class="card" style="margin-bottom:1.25rem">
      <h3>${d.checkTitle[lang]}</h3>
      <ul class="checklist" style="margin-top:.5rem">${checkHTML}</ul>
    </div>
    <div class="confidence-panel">
      <h3>${d.confidenceTitle[lang]}</h3>
      <p style="margin-top:.5rem;font-size:.95rem;max-width:600px;margin-left:auto;margin-right:auto">${d.confidenceText[lang]}</p>
    </div>`;
}


// ---------- PRACTICE ----------
function renderPractice() {
  const d = T.practice;
  const setObj = getPracticeSet();
  ensurePracticeTimer();
  const stageData = getPracticeStageData(setObj, practiceState.stageKey);
  const options = PRACTICE_BANK.map((setObj, idx) => `<option value="${idx}" ${idx===practiceState.setIndex?'selected':''}>${setObj.name[lang]}</option>`).join('');
  const stageButtons = practiceStageOrder.map(key => `
    <button class="practice-stage-btn${practiceState.stageKey===key?' active':''}" data-stage="${key}">
      <div class="practice-stage-title">${getStageLabel(key)}</div>
      <div class="practice-stage-meta">${formatTime(getStageDuration(key))}</div>
    </button>
  `).join('');
  return `
    <div class="progress-row"><span class="progress-pill">${lang==='en'?'Section 8 of 8':'第 8 / 8 部分'}</span></div>
    <h2>${d.title[lang]}</h2>
    <p class="subtitle" style="margin-bottom:1rem">${d.subtitle[lang]}</p>

    <div class="practice-toolbar">
      <label class="inline-help" for="practiceSetSelect">${d.chooseSet[lang]}</label>
      <select id="practiceSetSelect" class="practice-select">${options}</select>
      <button class="btn btn-secondary" id="practiceRandomBtn">${d.randomSet[lang]}</button>
      <button class="btn btn-ghost" id="practiceNextStageBtn">${d.nextStage[lang]}</button>
    </div>

    <div class="practice-note">${d.note[lang]}</div>

    <h3 style="margin:1rem 0 .8rem">${d.stageFlow[lang]}</h3>
    <div class="practice-stage-strip">${stageButtons}</div>

    <div class="practice-layout">
      <div class="practice-card">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:.85rem">
          <h3 style="margin:0">${stageData.title}</h3>
          <span class="mock-stage-badge ${stageData.assessed ? 'assessed' : 'not-assessed'}">${stageData.assessed ? (lang==='en'?'Assessed':'计分') : (lang==='en'?'Not assessed':'不计分')}</span>
        </div>
        ${stageData.body}
      </div>

      <div class="practice-side-stack">
        <div class="timer-shell">
          <h3>${d.timerTitle[lang]}</h3>
          <div id="practiceTimerHelp" class="timer-subtext"></div>
          <div id="practiceTimerDisplay" class="timer-display">${formatTime(Math.max(0, practiceState.timerRemaining || getStageDuration(practiceState.stageKey)))}</div>
          <div class="timer-controls">
            <button class="btn btn-primary" id="practiceStartTimerBtn">${d.startTimer[lang]}</button>
            <button class="btn btn-secondary" id="practicePauseTimerBtn">${d.pauseTimer[lang]}</button>
            <button class="btn btn-ghost" id="practiceResetTimerBtn">${d.resetTimer[lang]}</button>
          </div>
          <div id="practiceTimerStatus" class="timer-status">${d.timerReady[lang]}</div>
        </div>

        <div class="transcript-shell">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:.8rem;flex-wrap:wrap;margin-bottom:.75rem">
            <h3 style="margin:0">${d.transcriptTitle[lang]}</h3>
            <span id="practiceMicStatus" class="mic-status"><span class="mic-dot"></span>${d.micReady[lang]}</span>
          </div>
          <div class="inline-help" style="margin-bottom:.75rem">${d.transcriptHint[lang]}</div>
          <div class="timer-controls" style="margin-bottom:.75rem">
            <button class="btn btn-primary" id="practiceStartMicBtn">${d.startMic[lang]}</button>
            <button class="btn btn-secondary" id="practiceStopMicBtn">${d.stopMic[lang]}</button>
            <button class="btn btn-ghost" id="practiceClearTranscriptBtn">${d.clearTranscript[lang]}</button>
            <button class="btn btn-ghost" id="practiceCopyTranscriptBtn">${d.copyTranscript[lang]}</button>
          </div>
          <div id="practiceTranscript" class="transcript-box"><span class="transcript-placeholder">${d.transcriptPlaceholder[lang]}</span></div>
          <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-top:.7rem">
            <div id="practiceWordCount" class="word-count">${d.wordCount[lang]}: 0</div>
            <div id="practiceFeedback" class="inline-help">${d.micPermission[lang]}</div>
          </div>
        </div>
      </div>
    </div>`;
}
// =====================================================================
// INTERACTIVE BINDINGS
// =====================================================================
function bindAccordions() {
  document.querySelectorAll('.accordion-header').forEach(h => {
    h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
  });
}
function bindTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.tab;
      btn.closest('.section').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      btn.closest('.section').querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('active', p.dataset.tab===id));
    });
  });
}
function bindChecklist() {
  document.querySelectorAll('.check-box').forEach(box => {
    const key = `${lang}-${box.dataset.idx}`;
    box.classList.toggle('checked', !!checklistState[key]);
    box.addEventListener('click', () => {
      box.classList.toggle('checked');
      checklistState[key] = box.classList.contains('checked');
      localStorage.setItem('igcse0511checklist', JSON.stringify(checklistState));
    });
  });
}
function bindPractice() {
  const setSelect = document.getElementById('practiceSetSelect');
  if (!setSelect) return;
  setSelect.addEventListener('change', (e) => setPracticeSet(e.target.value));
  document.getElementById('practiceRandomBtn')?.addEventListener('click', randomPracticeSet);
  document.getElementById('practiceNextStageBtn')?.addEventListener('click', nextPracticeStage);
  document.querySelectorAll('.practice-stage-btn').forEach(btn => {
    btn.addEventListener('click', () => setPracticeStage(btn.dataset.stage));
  });
  document.getElementById('practiceStartTimerBtn')?.addEventListener('click', startPracticeTimer);
  document.getElementById('practicePauseTimerBtn')?.addEventListener('click', stopPracticeTimer);
  document.getElementById('practiceResetTimerBtn')?.addEventListener('click', resetPracticeTimer);
  document.getElementById('practiceStartMicBtn')?.addEventListener('click', startPracticeMic);
  document.getElementById('practiceStopMicBtn')?.addEventListener('click', stopPracticeMic);
  document.getElementById('practiceClearTranscriptBtn')?.addEventListener('click', clearPracticeTranscript);
  document.getElementById('practiceCopyTranscriptBtn')?.addEventListener('click', copyPracticeTranscript);
  updatePracticeTimerUI();
  updatePracticeTranscriptUI();
}

// =====================================================================

// =====================================================================
currentSection = Math.max(0, Math.min(currentSection, 7));
window.addEventListener('resize', () => { if (window.innerWidth > 860) document.getElementById('navLinks').classList.remove('open'); });
buildNav();
renderSection(currentSection);
