<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interview Vocabulary Mastery Lab</title>
<!-- Include global styles for unified colour palette -->
<link rel="stylesheet" href="styles.css" />
<style>
/* ============================================================
   INTERVIEW VOCABULARY MASTERY LAB — single-file app
   ============================================================ */
:root{
  --bg:#f6f7fb;
  --bg-2:#eef1f8;
  --panel:rgba(255,255,255,0.72);
  --panel-solid:#ffffff;
  --border:rgba(20,24,40,0.08);
  --text:#151826;
  --text-dim:#5b6480;
  --muted:#8891a8;
  --accent:#6366f1;
  --accent-2:#8b5cf6;
  --accent-3:#06b6d4;
  --success:#10b981;
  --warn:#f59e0b;
  --danger:#ef4444;
  --shadow-sm:0 1px 2px rgba(20,24,40,.05), 0 1px 3px rgba(20,24,40,.04);
  --shadow-md:0 4px 14px rgba(20,24,40,.08), 0 2px 4px rgba(20,24,40,.04);
  --shadow-lg:0 20px 60px rgba(20,24,40,.12), 0 8px 20px rgba(20,24,40,.06);
  --radius:16px;
  --radius-sm:10px;
  --radius-lg:24px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
}
[data-theme="dark"]{
  --bg:#0b0e1a;
  --bg-2:#0f1325;
  --panel:rgba(22,26,45,0.72);
  --panel-solid:#161a2d;
  --border:rgba(255,255,255,0.08);
  --text:#eef1fb;
  --text-dim:#aab2cc;
  --muted:#7a83a0;
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  --shadow-md:0 6px 18px rgba(0,0,0,.45);
  --shadow-lg:0 24px 70px rgba(0,0,0,.55), 0 8px 24px rgba(0,0,0,.4);
}
[data-accent="violet"]{--accent:#8b5cf6;--accent-2:#6366f1;--accent-3:#ec4899;}
[data-accent="teal"]{--accent:#06b6d4;--accent-2:#14b8a6;--accent-3:#3b82f6;}
[data-accent="rose"]{--accent:#f43f5e;--accent-2:#ec4899;--accent-3:#f97316;}
[data-accent="amber"]{--accent:#f59e0b;--accent-2:#f97316;--accent-3:#ef4444;}
[data-accent="emerald"]{--accent:#10b981;--accent-2:#06b6d4;--accent-3:#22c55e;}

*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:var(--font);color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
body{
  min-height:100vh;
  background:
    radial-gradient(1200px 600px at 85% -10%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 60%),
    radial-gradient(900px 500px at -10% 10%, color-mix(in srgb, var(--accent-2) 16%, transparent), transparent 60%),
    radial-gradient(800px 400px at 50% 100%, color-mix(in srgb, var(--accent-3) 12%, transparent), transparent 60%),
    var(--bg);
  background-attachment:fixed;
}
button{font:inherit;color:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font:inherit;color:inherit}
a{color:var(--accent);text-decoration:none}
h1,h2,h3,h4{margin:0;letter-spacing:-0.02em;font-weight:700}
h1{font-size:2.4rem;line-height:1.1}
h2{font-size:1.6rem}
h3{font-size:1.15rem}
.muted{color:var(--muted)}
.dim{color:var(--text-dim)}
.row{display:flex;gap:16px;align-items:center}
.col{display:flex;flex-direction:column;gap:12px}
.grid{display:grid;gap:18px}
.hidden{display:none !important}

/* ============================ NAVBAR ============================ */
.nav{
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  background:var(--panel);
  border-bottom:1px solid var(--border);
}
.nav-inner{
  max-width:1400px;margin:0 auto;padding:14px 28px;
  display:flex;align-items:center;gap:18px;
}
.brand{display:flex;align-items:center;gap:12px;font-weight:800;font-size:1.05rem;min-width:0}
.brand-stack{display:flex;flex-direction:column;gap:2px;min-width:0}
.brand-stack > span:first-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand-sub{font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim)}
.school-mini-logo{width:42px;height:42px;border-radius:12px;object-fit:contain;background:white;padding:4px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.brand-mark{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:grid;place-items:center;color:white;font-weight:800;
  box-shadow:var(--shadow-md);
}
.nav-links{display:flex;gap:4px;margin-left:8px;flex-wrap:wrap}
.nav-links button{
  padding:9px 14px;border-radius:10px;color:var(--text-dim);
  font-weight:600;font-size:.92rem;transition:all .2s;
}
.nav-links button:hover{background:color-mix(in srgb,var(--accent) 10%,transparent);color:var(--text)}
.nav-links button.active{
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:white;box-shadow:var(--shadow-sm);
}
.nav-right{margin-left:auto;display:flex;gap:10px;align-items:center}
.icon-btn{
  width:38px;height:38px;border-radius:10px;display:grid;place-items:center;
  background:color-mix(in srgb,var(--text) 6%,transparent);
  transition:all .2s;
}
.icon-btn:hover{background:color-mix(in srgb,var(--accent) 14%,transparent)}
.profile-chip{
  display:flex;align-items:center;gap:10px;padding:6px 14px 6px 6px;
  border-radius:999px;background:color-mix(in srgb,var(--text) 6%,transparent);
  font-weight:600;font-size:.9rem;
}
.avatar{
  width:28px;height:28px;border-radius:999px;
  background:linear-gradient(135deg,var(--accent),var(--accent-3));
  display:grid;place-items:center;color:white;font-weight:700;font-size:.8rem;
}

/* ============================ CONTAINER ============================ */
.container{max-width:1400px;margin:0 auto;padding:28px}
.page{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ============================ CARDS / GLASS ============================ */
.card{
  background:var(--panel);
  backdrop-filter:blur(12px) saturate(140%);
  -webkit-backdrop-filter:blur(12px) saturate(140%);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-md);
  padding:22px;
}
.card.solid{background:var(--panel-solid);backdrop-filter:none}
.card.gradient{
  background:linear-gradient(135deg,
    color-mix(in srgb,var(--accent) 20%,transparent),
    color-mix(in srgb,var(--accent-2) 16%,transparent));
  border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);
  color:var(--text);
}
.card-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
.card-title h3{font-size:1.05rem}

/* ============================ BUTTONS ============================ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 18px;border-radius:11px;font-weight:600;font-size:.93rem;
  border:1px solid var(--border);background:var(--panel-solid);color:var(--text);
  transition:all .18s;box-shadow:var(--shadow-sm);
}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn.primary{
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:white;border:none;
}
.btn.primary:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent;border-color:var(--border)}
.btn.danger{background:var(--danger);color:white;border:none}
.btn.success{background:var(--success);color:white;border:none}
.btn.warn{background:var(--warn);color:white;border:none}
.btn.big{padding:14px 24px;font-size:1rem;border-radius:14px}
.btn.tiny{padding:6px 10px;font-size:.8rem}
.btn.block{width:100%}

/* ============================ INPUTS ============================ */
.input,.select,textarea.input{
  width:100%;padding:11px 14px;border-radius:11px;
  border:1px solid var(--border);background:var(--panel-solid);
  color:var(--text);transition:border-color .18s,box-shadow .18s;
}
.input:focus,.select:focus,textarea.input:focus{
  outline:none;border-color:var(--accent);
  box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 18%,transparent);
}
label{font-size:.85rem;font-weight:600;color:var(--text-dim)}

/* ============================ LANDING ============================ */
.hero{
  position:relative;padding:80px 28px 40px;text-align:center;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;padding:8px 16px;
  border-radius:999px;background:color-mix(in srgb,var(--accent) 16%,transparent);
  color:var(--accent);font-size:.82rem;font-weight:600;
  border:1px solid color-mix(in srgb,var(--accent) 26%,transparent);
}
.hero-branding{display:grid;grid-template-columns:1fr auto 1fr;gap:18px;align-items:center;max-width:1100px;margin:0 auto 22px;text-align:left}
.logo-panel{padding:16px 18px;display:flex;align-items:center;gap:14px;min-height:92px}
.logo-panel.center{justify-content:center;text-align:center}
.hero-unit-title{font-size:1.1rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.hero-unit-sub{font-size:1.65rem;font-weight:800;line-height:1.15}
.cambridge-mark{display:flex;flex-direction:column;gap:4px}
.cambridge-mark .small{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim)}
.cambridge-mark .big{font-family:Georgia, 'Times New Roman', serif;font-size:1.85rem;letter-spacing:.06em;color:#a31d2f;font-weight:700}
.cambridge-mark .mid{font-size:.95rem;font-weight:700;color:var(--text)}
.school-hero-logo{max-width:100%;height:62px;object-fit:contain;display:block}
.school-hero-wrap{display:flex;justify-content:flex-end}
.hero h1{
  font-size:clamp(2.5rem,5vw,4rem);margin:20px 0 16px;
  background:linear-gradient(135deg,var(--text),color-mix(in srgb,var(--accent) 60%,var(--text)));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hero p{max-width:720px;margin:0 auto 28px;color:var(--text-dim);font-size:1.1rem;line-height:1.6}
.hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:30px}
.hero-features{
  display:grid;grid-template-columns:repeat(4,1fr);gap:18px;max-width:1100px;margin:46px auto 0;
}
.feature{text-align:left;padding:22px}
.feature-icon{
  width:44px;height:44px;border-radius:12px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));color:white;
  margin-bottom:14px;font-size:1.3rem;
}
.feature h4{font-size:1rem;margin-bottom:6px}
.feature p{color:var(--text-dim);font-size:.88rem;line-height:1.5;margin:0}

/* ============================ DASHBOARD ============================ */
.welcome{
  padding:32px;border-radius:var(--radius-lg);
  background:linear-gradient(135deg,
    color-mix(in srgb,var(--accent) 22%,var(--panel-solid)),
    color-mix(in srgb,var(--accent-2) 20%,var(--panel-solid)));
  border:1px solid var(--border);
  box-shadow:var(--shadow-lg);
  position:relative;overflow:hidden;
}
.welcome::before{
  content:"";position:absolute;right:-80px;top:-80px;width:320px;height:320px;
  background:radial-gradient(circle,color-mix(in srgb,var(--accent-3) 30%,transparent),transparent 70%);
  border-radius:999px;
}
.welcome-inner{position:relative;z-index:1}
.welcome h2{font-size:2rem;margin-bottom:6px}
.welcome .sub{color:var(--text-dim);margin-bottom:20px}
.welcome-stats{display:flex;gap:26px;flex-wrap:wrap;margin-top:18px}
.wstat{display:flex;flex-direction:column;gap:2px}
.wstat .n{font-size:1.6rem;font-weight:800;color:var(--text)}
.wstat .l{font-size:.78rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;font-weight:600}

.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:20px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:20px}
.stat-card{
  padding:20px;
}
.stat-card .label{font-size:.78rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:8px}
.stat-card .value{font-size:1.8rem;font-weight:800}
.stat-card .trend{font-size:.78rem;margin-top:4px;color:var(--success);font-weight:600}

/* Progress ring */
.ring{position:relative;width:140px;height:140px;margin:0 auto}
.ring svg{transform:rotate(-90deg)}
.ring .bg{stroke:color-mix(in srgb,var(--text) 10%,transparent);fill:none}
.ring .fg{fill:none;stroke:url(#ringGrad);stroke-linecap:round;transition:stroke-dashoffset .6s}
.ring .label{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.ring .label .pct{font-size:1.9rem;font-weight:800}
.ring .label .sub{font-size:.75rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;font-weight:600}

.progress-bar{height:10px;background:color-mix(in srgb,var(--text) 8%,transparent);border-radius:999px;overflow:hidden}
.progress-bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:999px;transition:width .5s}

.list{display:flex;flex-direction:column;gap:8px}
.list-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;
  border-radius:10px;background:color-mix(in srgb,var(--text) 4%,transparent);
  transition:background .15s;
}
.list-item:hover{background:color-mix(in srgb,var(--accent) 12%,transparent)}
.list-item .term{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-item .trans{color:var(--text-dim);font-size:.85rem;margin-left:auto;white-space:nowrap}
.chip{
  display:inline-block;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:600;
  background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent);
}
.chip.new{background:color-mix(in srgb,var(--muted) 18%,transparent);color:var(--muted)}
.chip.learning{background:color-mix(in srgb,#f59e0b 18%,transparent);color:#f59e0b}
.chip.developing{background:color-mix(in srgb,#06b6d4 18%,transparent);color:#06b6d4}
.chip.secure{background:color-mix(in srgb,#3b82f6 18%,transparent);color:#3b82f6}
.chip.mastered{background:color-mix(in srgb,var(--success) 18%,transparent);color:var(--success)}

/* ============================ MODE GRID ============================ */
.mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:20px}
.mode-card{
  padding:22px;cursor:pointer;text-align:left;
  transition:transform .18s,box-shadow .18s,border-color .18s;
  position:relative;overflow:hidden;
}
.mode-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:color-mix(in srgb,var(--accent) 40%,var(--border))}
.mode-card .micon{
  width:46px;height:46px;border-radius:12px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));color:white;font-size:1.4rem;
  margin-bottom:12px;
}
.mode-card h4{font-size:1.05rem;margin-bottom:6px}
.mode-card p{font-size:.85rem;color:var(--text-dim);margin:0;line-height:1.5}

/* ============================ STUDY SESSION ============================ */
.study-wrap{max-width:760px;margin:0 auto}
.study-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.study-progress{flex:1}
.study-progress .pbar{height:8px;background:color-mix(in srgb,var(--text) 8%,transparent);border-radius:999px;overflow:hidden}
.study-progress .pbar>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .4s}
.study-progress .ptext{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text-dim);margin-top:4px;font-weight:600}

/* Flashcard */
.flash{
  perspective:1200px;margin:0 auto;max-width:640px;min-height:380px;
}
.flash-inner{
  position:relative;width:100%;min-height:380px;
  transition:transform .7s cubic-bezier(.4,.2,.2,1);
  transform-style:preserve-3d;
}
.flash.flipped .flash-inner{transform:rotateY(180deg)}
.flash-face{
  position:absolute;inset:0;padding:40px;border-radius:var(--radius-lg);
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:18px;
  background:var(--panel);border:1px solid var(--border);box-shadow:var(--shadow-lg);
  backdrop-filter:blur(14px);
}
.flash-face.back{transform:rotateY(180deg);
  background:linear-gradient(135deg,
    color-mix(in srgb,var(--accent) 18%,var(--panel-solid)),
    color-mix(in srgb,var(--accent-2) 14%,var(--panel-solid)));
}
.flash .term{font-size:2.2rem;font-weight:800;letter-spacing:-.02em}
.flash .trans{font-size:2rem;font-weight:700}
.flash .pos{color:var(--text-dim);font-size:.85rem;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.flash .ex{color:var(--text-dim);font-style:italic;font-size:.95rem;max-width:500px}
.flash .hint{color:var(--muted);font-size:.78rem;margin-top:8px}

.rate-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px;max-width:640px;margin-left:auto;margin-right:auto}
.rate-btn{
  padding:14px;border-radius:12px;font-weight:700;font-size:.92rem;
  border:1px solid var(--border);background:var(--panel-solid);color:var(--text);
  transition:all .18s;box-shadow:var(--shadow-sm);
}
.rate-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.rate-btn .k{display:block;font-size:.68rem;color:var(--muted);font-weight:600;margin-top:2px}
.rate-btn.again{border-color:var(--danger);color:var(--danger)}
.rate-btn.hard{border-color:var(--warn);color:var(--warn)}
.rate-btn.good{border-color:var(--accent);color:var(--accent)}
.rate-btn.easy{border-color:var(--success);color:var(--success)}

/* Multiple choice */
.choices{display:grid;gap:12px;max-width:640px;margin:0 auto}
.choice{
  padding:16px 20px;border-radius:12px;border:1px solid var(--border);
  background:var(--panel-solid);text-align:left;font-size:1rem;font-weight:500;
  transition:all .18s;
}
.choice:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--panel-solid))}
.choice.correct{background:color-mix(in srgb,var(--success) 20%,var(--panel-solid));border-color:var(--success);color:var(--success)}
.choice.wrong{background:color-mix(in srgb,var(--danger) 20%,var(--panel-solid));border-color:var(--danger);color:var(--danger)}
.choice.dim{opacity:.5}

.prompt{text-align:center;margin-bottom:22px}
.prompt .q-label{font-size:.78rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:8px}
.prompt .q-text{font-size:2rem;font-weight:800}
.prompt .q-sub{font-size:1rem;color:var(--text-dim);margin-top:6px}

/* Match mode */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:860px;margin:0 auto}
.match-col{display:flex;flex-direction:column;gap:10px}
.match-item{
  padding:14px 18px;border-radius:12px;border:1px solid var(--border);
  background:var(--panel-solid);cursor:pointer;font-weight:500;transition:all .15s;text-align:left;
}
.match-item:hover{border-color:var(--accent)}
.match-item.selected{background:color-mix(in srgb,var(--accent) 18%,var(--panel-solid));border-color:var(--accent);color:var(--accent)}
.match-item.matched{background:color-mix(in srgb,var(--success) 16%,var(--panel-solid));border-color:var(--success);color:var(--success);cursor:default}
.match-item.wrong{background:color-mix(in srgb,var(--danger) 16%,var(--panel-solid));border-color:var(--danger);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* Library */
.lib-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.lib-bar .input{flex:1;min-width:220px}
.lib-bar .select{min-width:160px;flex:0 0 auto}
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.vocab-card{padding:18px;cursor:pointer;transition:all .18s}
.vocab-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.vocab-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
.vocab-card .t{font-size:1.1rem;font-weight:700}
.vocab-card .tr{color:var(--text-dim);font-size:1rem;margin-bottom:8px}
.vocab-card .ex{color:var(--muted);font-size:.82rem;font-style:italic;line-height:1.4}
.vocab-card .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}

/* Modal */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(10,12,24,.6);backdrop-filter:blur(6px);
  display:grid;place-items:center;z-index:100;animation:fadeIn .2s;
}
.modal{
  max-width:600px;width:calc(100% - 40px);max-height:90vh;overflow:auto;
  background:var(--panel-solid);border-radius:var(--radius-lg);
  padding:28px;box-shadow:var(--shadow-lg);border:1px solid var(--border);
}
.modal h2{margin-bottom:16px}
.modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap}

/* Analytics */
.chart-wrap{padding:22px}
.bar-chart{display:flex;flex-direction:column;gap:12px;margin-top:10px}
.bar-row{display:flex;align-items:center;gap:12px;font-size:.88rem}
.bar-row .lbl{min-width:140px;color:var(--text-dim);font-weight:600}
.bar-row .bar{flex:1;height:22px;background:color-mix(in srgb,var(--text) 8%,transparent);border-radius:8px;overflow:hidden;position:relative}
.bar-row .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:8px;transition:width .6s}
.bar-row .v{min-width:64px;text-align:right;font-weight:700}

.spark{width:100%;height:120px}

/* Badges */
.badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.badge{
  padding:18px;text-align:center;border-radius:var(--radius);
  background:var(--panel);border:1px solid var(--border);
  transition:all .18s;
}
.badge.earned{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 26%,var(--panel-solid)),color-mix(in srgb,var(--accent-2) 20%,var(--panel-solid)));border-color:color-mix(in srgb,var(--accent) 40%,var(--border))}
.badge .bi{font-size:2rem;margin-bottom:8px;filter:grayscale(1);opacity:.5}
.badge.earned .bi{filter:none;opacity:1}
.badge .bn{font-weight:700;font-size:.92rem}
.badge .bd{font-size:.76rem;color:var(--text-dim);margin-top:4px}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  padding:14px 22px;background:var(--text);color:var(--bg);
  border-radius:12px;font-weight:600;box-shadow:var(--shadow-lg);
  z-index:200;animation:toastIn .3s;
}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

/* Session complete */
.complete{text-align:center;padding:40px 20px;max-width:600px;margin:0 auto}
.complete .big-icon{font-size:4rem;margin-bottom:16px}
.complete h2{font-size:2rem;margin-bottom:8px}
.complete .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0}

/* Profile cards */
.profile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;margin-top:24px}
.profile-card{
  padding:26px;text-align:center;cursor:pointer;transition:all .2s;
}
.profile-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--accent)}
.profile-card .big-avatar{
  width:72px;height:72px;border-radius:999px;margin:0 auto 14px;
  background:linear-gradient(135deg,var(--accent),var(--accent-3));
  display:grid;place-items:center;color:white;font-weight:800;font-size:1.8rem;
}
.profile-card .name{font-weight:700;font-size:1.05rem}
.profile-card .sub{font-size:.8rem;color:var(--text-dim);margin-top:4px}
.profile-card.new{border-style:dashed;background:transparent}
.profile-card.new:hover{background:color-mix(in srgb,var(--accent) 10%,transparent)}

/* Teacher table */
.tbl{width:100%;border-collapse:collapse;font-size:.9rem}
.tbl th,.tbl td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
.tbl th{font-size:.78rem;text-transform:uppercase;color:var(--text-dim);letter-spacing:.05em;font-weight:700}
.tbl tbody tr:hover{background:color-mix(in srgb,var(--accent) 8%,transparent)}

/* responsive */
@media (max-width:1100px){
  .hero-branding{grid-template-columns:1fr;max-width:760px;text-align:center}
  .logo-panel,.school-hero-wrap{justify-content:center;text-align:center}
  .hero-features{grid-template-columns:repeat(2,1fr)}
  .mode-grid{grid-template-columns:repeat(2,1fr)}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .dash-grid{grid-template-columns:1fr}
  .match-grid{grid-template-columns:1fr}
}
@media (max-width:680px){
  .nav-links{display:none}
  .nav-inner{padding:12px 16px}
  .school-mini-logo{width:34px;height:34px;border-radius:10px}
  .brand-sub{display:none}
  h1{font-size:2rem}
  .rate-row{grid-template-columns:repeat(2,1fr)}
}

function loadAll(){
  try{
    const v = JSON.parse(localStorage.getItem(LS_KEYS.vocab) || "null");
    state.vocab = Array.isArray(v) && v.length ? v : clone(STARTER_VOCAB);
  }catch(e){ state.vocab = clone(STARTER_VOCAB); }
  try{
    state.profiles = JSON.parse(localStorage.getItem(LS_KEYS.profiles) || "{}") || {};
  }catch(e){ state.profiles = {}; }
  migrateProfiles();
  state.currentProfile = localStorage.getItem(LS_KEYS.current) || null;
  const theme = localStorage.getItem(LS_KEYS.theme) || "light";
  const accent = localStorage.getItem(LS_KEYS.accent) || "indigo";
  document.body.setAttribute("data-theme", theme);
  document.body.setAttribute("data-accent", accent);
}
function saveVocab(){ localStorage.setItem(LS_KEYS.vocab, JSON.stringify(state.vocab)); }
function saveProfiles(){ localStorage.setItem(LS_KEYS.profiles, JSON.stringify(state.profiles)); }
function saveCurrent(){
  if(state.currentProfile) localStorage.setItem(LS_KEYS.current, state.currentProfile);
  else localStorage.removeItem(LS_KEYS.current);
}
function clone(x){ return JSON.parse(JSON.stringify(x)); }
function simpleHash(str){
  let h = 2166136261 >>> 0;
  str = String(str || "");
  for(let i=0;i<str.length;i++){
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return (h >>> 0).toString(36);
}
function migrateProfiles(){
  let changed = false;
  Object.values(state.profiles).forEach(p=>{
    if(!p) return;
    if(!p.createdAt){ p.createdAt = new Date().toISOString(); changed = true; }
    if(!p.lastActive){ p.lastActive = today(); changed = true; }
    if(typeof p.streak !== "number"){ p.streak = 0; changed = true; }
    if(typeof p.longestStreak !== "number"){ p.longestStreak = 0; changed = true; }
    if(typeof p.studyTimeSec !== "number"){ p.studyTimeSec = 0; changed = true; }
    if(!p.studyTimeByDay){ p.studyTimeByDay = {}; changed = true; }
    if(!Array.isArray(p.sessions)){ p.sessions = []; changed = true; }
    if(!p.items){ p.items = {}; changed = true; }
    if(!p.modeAccuracy){ p.modeAccuracy = {}; changed = true; }
    if(!Array.isArray(p.achievements)){ p.achievements = []; changed = true; }
    if(p.pin && !p.pinHash){ p.pinHash = simpleHash(p.pin); delete p.pin; changed = true; }
  });
  if(changed) saveProfiles();
}
function getTeacherPinHash(){ return localStorage.getItem(LS_KEYS.teacherPin) || ""; }
function setTeacherPin(pin){ localStorage.setItem(LS_KEYS.teacherPin, simpleHash(pin)); }
function clearTeacherPin(){ localStorage.removeItem(LS_KEYS.teacherPin); state.teacherUnlocked = false; }
function runViewCleanup(){
  if(typeof state.viewCleanup === "function") {
    try{ state.viewCleanup(); }catch(e){}
  }
  state.viewCleanup = null;
}
function looksLikeIOS(){ return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1); }
function escapeRegExp(str){ return String(str).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function normalizeKey(term, translation){
  return [String(term||"").trim().toLowerCase(), String(translation||"").trim().toLowerCase()].join("||");
}
function preserveImportedIds(parsed, existing){
  const byKey = new Map((existing || []).map(v=>[normalizeKey(v.term, v.translation), v.id]));
  let counter = Date.now();
  return parsed.map(v=>{
    const key = normalizeKey(v.term, v.translation);
    const keepId = byKey.get(key);
    return { ...v, id: keepId || v.id || `v${counter++}` };
  });
}
function countPotentialOrphans(nextVocab){
  const nextIds = new Set((nextVocab || []).map(v=>v.id));
  let total = 0;
  Object.values(state.profiles).forEach(p=>{
    Object.keys(p.items || {}).forEach(id=>{ if(!nextIds.has(id)) total++; });
  });
  return total;
}

/* =========================================================
   ================        HELPERS          ===============
   ========================================================= */
function $(sel,root=document){return root.querySelector(sel)}
function $$(sel,root=document){return [...root.querySelectorAll(sel)]}
function el(tag,attrs={},...children){
  const e = document.createElement(tag);
  for(const k in attrs){
    if(k==="class") e.className = attrs[k];
    else if(k==="html") e.innerHTML = attrs[k];
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if(k==="style" && typeof attrs[k]==="object") Object.assign(e.style,attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  for(const c of children){
    if(c==null) continue;
    if(typeof c === "string" || typeof c === "number") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}
function toast(msg){
  const t = el("div",{class:"toast"},msg);
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2200);
}
function fmtTime(sec){
  sec = Math.floor(sec||0);
  if(sec < 60) return sec+"s";
  const m = Math.floor(sec/60);
  const s = sec%60;
  if(m<60) return m+"m "+s+"s";
  return Math.floor(m/60)+"h "+(m%60)+"m";
}
function today(){ return new Date().toISOString().slice(0,10); }
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
function initials(name){ return (name||"?").split(/\s+/).map(x=>x[0]).join("").slice(0,2).toUpperCase(); }
function levenshtein(a,b){
  a=a.toLowerCase().trim(); b=b.toLowerCase().trim();
  const m=a.length,n=b.length;
  if(!m) return n; if(!n) return m;
  const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++) d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){
    d[i][j]= a[i-1]===b[j-1]? d[i-1][j-1] : 1+Math.min(d[i-1][j],d[i][j-1],d[i-1][j-1]);
  }
  return d[m][n];
}
function typoTolerantEqual(a,b){
  if(!a || !b) return false;
  a=a.toLowerCase().trim(); b=b.toLowerCase().trim();
  if(a===b) return true;
  const tol = Math.max(1, Math.floor(b.length*0.15));
  return levenshtein(a,b) <= tol;
}

   ================      PROFILE LOGIC      ===============
   ========================================================= */
function newProfileRecord(name, pin=""){
  return {
    name,
    pinHash: pin ? simpleHash(pin) : "",
    createdAt: new Date().toISOString(),
    lastActive: today(),
    streak: 0,
    longestStreak: 0,
    studyTimeSec: 0,
    studyTimeByDay: {},  // {date:sec}
    sessions: [],
    items: {},            // vocabId -> stats
    modeAccuracy: {},     // mode -> {correct,total}
    achievements: []
  };
}
function itemStats(profile, id){
  if(!profile.items[id]){
    profile.items[id] = {
      id, seen:0, correct:0, incorrect:0,
      confidence:0, speed:0,
      lastReviewed:null,
      priority:5,
      level:"New",
      ratings:[]
    };
  }
  return profile.items[id];
}
function getProfile(){
  if(!state.currentProfile) return null;
  return state.profiles[state.currentProfile] || null;
}
function setProfile(name, pin=""){
  if(!state.profiles[name]) state.profiles[name] = newProfileRecord(name, pin);
  state.currentProfile = name;
  saveProfiles(); saveCurrent();
  renderNav();
}
function updateStreak(profile){
  const t = today();
  const last = profile.lastActive;
  if(last === t) return;
  const d = new Date(t);
  const ld = last? new Date(last):null;
  const diff = ld? Math.round((d - ld)/86400000) : 99;
  if(diff === 1) profile.streak += 1;
  else if(diff > 1) profile.streak = 1;
  else profile.streak = Math.max(profile.streak,1);
  profile.longestStreak = Math.max(profile.longestStreak||0, profile.streak);
  profile.lastActive = t;
}

/* Mastery transitions */
function recomputeLevel(st){
  const c = st.confidence;
  if(st.seen === 0){ st.level="New"; return; }
  if(c < 20) st.level = "Learning";
  else if(c < 50) st.level = "Developing";
  else if(c < 85) st.level = "Secure";
  else st.level = "Mastered";
}
function rateItem(profile, id, rating /* again|hard|good|easy */){
  const st = itemStats(profile, id);
  st.seen += 1;
  st.lastReviewed = new Date().toISOString();
  st.ratings.push({r:rating, t:Date.now()});
  const delta = {again:-20, hard:-5, good:+12, easy:+22}[rating] || 0;
  st.confidence = Math.max(0, Math.min(100, st.confidence + delta));
  if(rating === "again" || rating === "hard"){
    st.incorrect += (rating === "again" ? 1 : 0);
    st.priority = Math.min(10, st.priority + 2);
  } else {
    st.correct += 1;
    st.priority = Math.max(0, st.priority - 1);
  }
  recomputeLevel(st);
}
function recordAnswer(profile, id, correct, mode, speedMs){
  const st = itemStats(profile, id);
  st.seen += 1;
  st.lastReviewed = new Date().toISOString();
  if(correct){
    st.correct += 1;
    st.confidence = Math.min(100, st.confidence + (speedMs<4000? 14:10));
    st.priority = Math.max(0, st.priority - 1);
  } else {
    st.incorrect += 1;
    st.confidence = Math.max(0, st.confidence - 16);
    st.priority = Math.min(10, st.priority + 2);
  }
  st.speed = speedMs;
  recomputeLevel(st);
  // mode accuracy
  if(!profile.modeAccuracy[mode]) profile.modeAccuracy[mode]={correct:0,total:0};
  profile.modeAccuracy[mode].total += 1;
  if(correct) profile.modeAccuracy[mode].correct += 1;
}

/* Session engine */
function pickSessionItems(mode, size=12){
  const p = getProfile();
  let pool = state.vocab.map(v=>({v, s:itemStats(p, v.id)}));
  if(mode==="idioms") pool = pool.filter(x=>x.v.type==="idiom");
  if(mode==="weak") pool = pool.filter(x=>x.s.priority>=5 || x.s.confidence<50).slice(0,50);
  // adaptive weighting: higher priority + lower confidence -> higher pick weight
  const weighted = pool.map(x=>{
    const w = 1 + (x.s.priority||5) + Math.max(0, (100-x.s.confidence)/20);
    return {x,w};
  });
  // roulette selection without replacement
  const chosen = [];
  const copy = [...weighted];
  while(chosen.length < Math.min(size, copy.length)){
    const sum = copy.reduce((a,b)=>a+b.w,0);
    let r = Math.random()*sum;
    let idx = 0;
    for(let i=0;i<copy.length;i++){
      r -= copy[i].w;
      if(r<=0){ idx=i; break; }
    }
    chosen.push(copy[idx].x.v);
    copy.splice(idx,1);
  }
  if(chosen.length===0) return shuffle(state.vocab).slice(0,Math.min(size,state.vocab.length));
  return chosen;
}
function startSession(mode){
  const p = getProfile();
  if(!p){ go("profiles"); return; }
  const sizeByMode = {match:8, speed:20, sim:6};
  const size = sizeByMode[mode] || 12;
  const items = pickSessionItems(mode, size);
  if(items.length === 0){ toast("No vocabulary available"); return; }
  state.session = {
    mode, items, idx:0,
    correct:0, total:0,
    startedAt: Date.now(),
    combo:0, maxCombo:0,
    score:0,
    subMode: null
  };
  renderSession();
}
function endSession(){
  const s = state.session;
  if(!s) return;
  const p = getProfile();
  const dur = Math.round((Date.now() - s.startedAt)/1000);
  p.studyTimeSec = (p.studyTimeSec||0) + dur;
  p.studyTimeByDay[today()] = (p.studyTimeByDay[today()]||0) + dur;
  p.sessions.push({
    mode: s.mode, total: s.total, correct: s.correct,
    durationSec: dur, at: new Date().toISOString(), score: s.score
  });
  checkAchievements(p);
  saveProfiles();
  renderComplete(dur);
}

function renderFlashcard(page, v){
  const card = el("div",{class:"flash"});

    b.appendChild(el("span",{class:"k"}, (i+1)+""));
    rates.appendChild(b);
  });

  const p = getProfile();
  function handleRate(r){
    rateItem(p, v.id, r);
    if(r!=="again"){ state.session.correct++; }
    state.session.total++;
    state.session.idx++;
    saveProfiles();
    renderSession();
  }
  // keyboard
  const keys = (e)=>{
    if(e.code==="Space"){ e.preventDefault(); card.classList.toggle("flipped"); }
    if(e.key==="1") handleRate("again");
    if(e.key==="2") handleRate("hard");
    if(e.key==="3") handleRate("good");
    if(e.key==="4") handleRate("easy");
  };
  document.addEventListener("keydown", keys, {once:false});
  state.viewCleanup = ()=>document.removeEventListener("keydown",keys);
}

function pickDistractors(v, field, n=3){
  const pool = state.vocab.filter(x=>x.id!==v.id);
  const same = (k)=>pool.filter(x=>x[k]===v[k]);
  let order = [];
  if(v.distractorGroup){
    order = order.concat(same("distractorGroup"));
  }
  order = order.concat(same("category"));
  order = order.concat(same("level"));
  order = order.concat(same("partOfSpeech"));
  order = order.concat(pool);
  const seen = new Set(); const out = [];
  for(const x of order){
    if(seen.has(x.id)) continue;
    if(x[field]===v[field]) continue;
    seen.add(x.id); out.push(x);
    if(out.length>=n) break;
  }
  return out;
}
function renderMCQ(page, v, dir){
  const isE2C = dir==="en2zh";
  const field = isE2C? "translation" : "term";
  const distract = pickDistractors(v, field, 3);
  const opts = shuffle([v, ...distract]);
  const prompt = el("div",{class:"prompt"});
  prompt.appendChild(el("div",{class:"q-label"}, isE2C? "Choose the Chinese meaning":"Choose the English term"));
  prompt.appendChild(el("div",{class:"q-text"}, isE2C? v.term : v.translation));
  if(v.example && isE2C) prompt.appendChild(el("div",{class:"q-sub"}, v.example));
  page.appendChild(prompt);
  const choices = el("div",{class:"choices"});
  const start = Date.now();
  opts.forEach(o=>{
    const b = el("button",{class:"choice"}, o[field]);
    b.onclick = ()=>{
      const correct = o.id === v.id;
      const speed = Date.now()-start;
      $$(".choice",choices).forEach(c=>{
        if(c.textContent === v[field]) c.classList.add("correct");
        else if(c===b && !correct) c.classList.add("wrong");
        else c.classList.add("dim");
        c.disabled = true;
      });
      const p = getProfile();
      recordAnswer(p, v.id, correct, "mcq", speed);
      if(correct) state.session.correct++;
      state.session.total++;
      saveProfiles();
      setTimeout(()=>{ state.session.idx++; renderSession(); }, 900);
    };
    choices.appendChild(b);
  });
  page.appendChild(choices);
}
function renderTyping(page, v){
  const prompt = el("div",{class:"prompt"});
  prompt.appendChild(el("div",{class:"q-label"},"Type the English term"));
  prompt.appendChild(el("div",{class:"q-text"}, v.translation));
  if(v.partOfSpeech) prompt.appendChild(el("div",{class:"q-sub"},"("+v.partOfSpeech+")"));
  page.appendChild(prompt);
  const input = el("input",{class:"input",placeholder:"Type here...",style:{maxWidth:"480px",margin:"0 auto",display:"block",textAlign:"center",fontSize:"1.2rem"}});
  page.appendChild(input);
  const fb = el("div",{style:{textAlign:"center",marginTop:"14px",minHeight:"24px",fontWeight:"600"}});
  page.appendChild(fb);
  const btnRow = el("div",{style:{display:"flex",justifyContent:"center",gap:"10px",marginTop:"14px"}});
  const submit = el("button",{class:"btn primary",onclick:doSubmit},"Submit");
  const skip = el("button",{class:"btn ghost",onclick:doSkip},"Skip");
  btnRow.appendChild(submit); btnRow.appendChild(skip);
  page.appendChild(btnRow);
  input.focus();
  input.addEventListener("keydown",(e)=>{if(e.key==="Enter") doSubmit()});
  const start = Date.now();
  function doSubmit(){
    const val = input.value;
    if(!val.trim()){ return; }
    const ok = typoTolerantEqual(val, v.term);
    fb.innerHTML = ok ? `<span style="color:var(--success)">✓ Correct — ${v.term}</span>` :
      `<span style="color:var(--danger)">✗ Answer: ${v.term}</span>`;
    const p = getProfile();
    recordAnswer(p, v.id, ok, "typing", Date.now()-start);
    if(ok) state.session.correct++;
    state.session.total++;
    saveProfiles();
    submit.disabled = skip.disabled = true;
    setTimeout(()=>{ state.session.idx++; renderSession(); }, 1100);
  }
  function doSkip(){
    fb.innerHTML = `<span style="color:var(--warn)">Answer: ${v.term}</span>`;
    const p = getProfile();
    recordAnswer(p, v.id, false, "typing", Date.now()-start);
    state.session.total++;
    saveProfiles();
    submit.disabled = skip.disabled = true;
    setTimeout(()=>{ state.session.idx++; renderSession(); }, 1100);
  }
}
function renderCloze(page, v){
  let sentence = v.example || `I am a ${v.term}.`;
  const rx = new RegExp("\\b"+v.term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+"\\b","i");
  let cloze;
  if(rx.test(sentence)) cloze = sentence.replace(rx, "_____");
  else cloze = sentence + " ("+"_____"+")";
  const prompt = el("div",{class:"prompt"});
  prompt.appendChild(el("div",{class:"q-label"},"Fill in the blank"));
  prompt.appendChild(el("div",{class:"q-text",style:{fontSize:"1.4rem",lineHeight:"1.4"}}, cloze));
  prompt.appendChild(el("div",{class:"q-sub"}, v.translation));
  page.appendChild(prompt);

  btnRow.appendChild(submit);
  page.appendChild(btnRow);
  input.focus();
  input.addEventListener("keydown",(e)=>{if(e.key==="Enter") doSubmit()});
  const start = Date.now();
  function doSubmit(){
    const val = input.value;
    if(!val.trim()) return;
    const ok = typoTolerantEqual(val, v.term);
    fb.innerHTML = ok? `<span style="color:var(--success)">✓ ${v.term}</span>` : `<span style="color:var(--danger)">✗ ${v.term}</span>`;
    const p = getProfile();
    recordAnswer(p, v.id, ok, "cloze", Date.now()-start);
    if(ok) state.session.correct++;
    state.session.total++;
    saveProfiles();
    submit.disabled = true;
    setTimeout(()=>{ state.session.idx++; renderSession(); }, 1100);

}
function renderMatch(page){
  const items = state.session.items.slice(0,8);
  const left = shuffle(items);
  const right = shuffle(items);
  const wrap = el("div",{class:"match-grid"});
  const colL = el("div",{class:"match-col"});
  const colR = el("div",{class:"match-col"});
  wrap.appendChild(colL); wrap.appendChild(colR);
  page.appendChild(wrap);
  let sel = null;
  let matched = 0;
  left.forEach(v=>{
    const b = el("button",{class:"match-item","data-id":v.id},v.term);
    b.onclick = ()=>pick(b,v,"L");
    colL.appendChild(b);
  });
  right.forEach(v=>{
    const b = el("button",{class:"match-item","data-id":v.id},v.translation);
    b.onclick = ()=>pick(b,v,"R");
    colR.appendChild(b);
  });
  function pick(btn, v, side){
    if(btn.classList.contains("matched")) return;
    if(sel && sel.side === side){
      sel.btn.classList.remove("selected");
      sel = {btn,v,side}; btn.classList.add("selected");
      return;
    }
    if(!sel){ sel = {btn,v,side}; btn.classList.add("selected"); return; }
    if(sel.v.id === v.id){
      sel.btn.classList.remove("selected");
      sel.btn.classList.add("matched");
      btn.classList.add("matched");
      matched++;
      const p = getProfile();
      recordAnswer(p, v.id, true, "match", 1500);
      state.session.correct++;
      state.session.total++;
      saveProfiles();
      sel = null;
      if(matched === items.length){
        setTimeout(()=>{ state.session.idx = state.session.items.length; renderSession(); }, 700);
      }
    } else {
      const wrong = btn;
      sel.btn.classList.add("wrong");
      wrong.classList.add("wrong");
      const s2 = sel;
      const p = getProfile();
      recordAnswer(p, sel.v.id, false, "match", 1500);
      if(v.id !== sel.v.id) recordAnswer(p, v.id, false, "match", 1500);
      state.session.total++;
      saveProfiles();
      setTimeout(()=>{
        s2.btn.classList.remove("wrong","selected");
        wrong.classList.remove("wrong");
      },500);
      sel = null;
    }
  }
}
function renderSpeed(page, v){
  const s = state.session;
  if(s.speedStart === undefined){
    s.speedStart = Date.now();
    s.speedDur = 60; // seconds
  }
  const remaining = Math.max(0, s.speedDur - Math.floor((Date.now()-s.speedStart)/1000));
  const timer = el("div",{style:{textAlign:"center",marginBottom:"16px"}});
  timer.appendChild(el("div",{style:{fontSize:"3rem",fontWeight:"800",color:"var(--accent)"}}, remaining+"s"));
  timer.appendChild(el("div",{class:"muted"},`Score: ${s.score}  •  Combo: ${s.combo}x  •  Best: ${s.maxCombo}x`));
  page.appendChild(timer);
  if(remaining === 0){ s.idx = s.items.length; return endSession(); }
  setTimeout(()=>{ if(state.route!=="study" && state.session) renderSession(); }, 1000);
  // Render one MCQ q
  const field = "translation";
  const distract = pickDistractors(v, field, 3);
  const opts = shuffle([v, ...distract]);
  const prompt = el("div",{class:"prompt"});
  prompt.appendChild(el("div",{class:"q-text"}, v.term));
  page.appendChild(prompt);
  const choices = el("div",{class:"choices"});
  const start = Date.now();
  opts.forEach(o=>{
    const b = el("button",{class:"choice"}, o[field]);
    b.onclick = ()=>{
      const correct = o.id === v.id;
      const speed = Date.now()-start;
      const p = getProfile();
      recordAnswer(p, v.id, correct, "speed", speed);
      if(correct){
        s.combo++; s.maxCombo = Math.max(s.maxCombo, s.combo);
        s.score += 100 + s.combo*10;
        s.correct++;
      } else {
        s.combo = 0;
      }
      s.total++;
      s.idx++;
      if(s.idx >= s.items.length){
        // loop items
        s.items = pickSessionItems("speed", 20);
        s.idx = 0;
      }
      saveProfiles();
      renderSession();
    };
    choices.appendChild(b);
  });
  page.appendChild(choices);
}

routes.library = function(node){
  const p = getProfile();
  node.appendChild(el("h1",{},"Vocabulary Library"));
  node.appendChild(el("p",{class:"muted",style:{marginBottom:"8px"}},`${state.vocab.length} items`));
  const bar = el("div",{class:"lib-bar"});
  const search = el("input",{class:"input",placeholder:"🔍 Search term, translation, example..."});
  const types = [...new Set(state.vocab.map(v=>v.type))];
  const cats = [...new Set(state.vocab.map(v=>v.category))];
  const levels = [...new Set(state.vocab.map(v=>v.level))];
  const typeSel = selectEl([["","All types"],...types.map(t=>[t,t])]);
  const catSel = selectEl([["","All categories"],...cats.map(t=>[t,t])]);
  const levelSel = selectEl([["","All levels"],...levels.map(t=>[t,t])]);
  const mastSel = selectEl([["","All mastery"],["New","New"],["Learning","Learning"],["Developing","Developing"],["Secure","Secure"],["Mastered","Mastered"]]);
  const sortSel = selectEl([["a-z","Sort A→Z"],["weakest","Sort weakest"],["strongest","Sort strongest"],["priority","Sort by review priority"]]);
  [search,typeSel,catSel,levelSel,mastSel,sortSel].forEach(x=>bar.appendChild(x));
  node.appendChild(bar);
  const grid = el("div",{class:"lib-grid"});
  node.appendChild(grid);

  function render(){
    grid.innerHTML = "";
    let items = state.vocab.slice();
    const q = search.value.trim().toLowerCase();
    if(q) items = items.filter(v=>[v.term,v.translation,v.example,v.category].some(x=>(x||"").toLowerCase().includes(q)));
    if(typeSel.value) items = items.filter(v=>v.type===typeSel.value);
    if(catSel.value) items = items.filter(v=>v.category===catSel.value);
    if(levelSel.value) items = items.filter(v=>v.level===levelSel.value);
    if(mastSel.value && p) items = items.filter(v=>(itemStats(p,v.id).level)===mastSel.value);
    const sort = sortSel.value;
    items.sort((a,b)=>{
      if(sort==="a-z") return a.term.localeCompare(b.term);
      if(!p) return 0;
      const sa = itemStats(p,a.id), sb = itemStats(p,b.id);
      if(sort==="weakest") return sa.confidence - sb.confidence;
      if(sort==="strongest") return sb.confidence - sa.confidence;
      if(sort==="priority") return sb.priority - sa.priority;
      return 0;
    });
    if(items.length===0){ grid.appendChild(el("div",{class:"muted"},"No results.")); return; }
    items.forEach(v=>grid.appendChild(renderVocabCard(v,p)));
  }
  [search,typeSel,catSel,levelSel,mastSel,sortSel].forEach(x=>x.addEventListener("input",render));
  render();
};
function selectEl(options){

    s.appendChild(o);
  });
  return s;
}

  const idiomMastered = mastered.filter(x=>{const v=state.vocab.find(v=>v.id===x.id); return v&&v.type==="idiom"});
  const total = state.vocab.length;
  const add = (id)=>{ if(!p.achievements.includes(id)){ p.achievements.push(id); toast("🏆 Achievement unlocked: "+ACHIEVEMENTS.find(a=>a.id===id).name); } };
  if(p.sessions.length >= 1) add("first-session");
  if(mastered.length >= 10) add("10-mastered");
  if(mastered.length >= 25) add("25-mastered");
  if(idiomMastered.length >= 10) add("idiom-master");
  if(p.streak >= 3) add("streak-3");
  if(p.streak >= 7) add("streak-7");
  const last = p.sessions[p.sessions.length-1];
  if(last && last.total>0 && last.correct/last.total >= 0.9) add("accuracy-90");
  if(mastered.length/total >= 0.75) add("interview-ready");
}

function parseVocabInput(text){
  text = text.trim();
  if(!text) return [];
  if(text.startsWith("[") || text.startsWith("{")){
    const j = JSON.parse(text);
    const arr = Array.isArray(j)? j : (j.vocab||j.items||[]);
    return arr.map((v,i)=>({
      id: v.id || `v${i+1}`,
      term:v.term||v.english||v.en||"",
      translation:v.translation||v.chinese||v.zh||v.meaning||"",
      type:v.type||((v.term||"").includes(" ")?"phrase":"word"),
      category:v.category||"General",
      topic:v.topic||v.category||"",
      partOfSpeech:v.partOfSpeech||v.pos||"",
      level:v.level||"B1",
      difficulty:parseInt(v.difficulty)||2,
      distractorGroup:v.distractorGroup||String(v.category||"general").toLowerCase().replace(/\s+/g,"_"),
      example:v.example||"",
      notes:v.notes||""
    })).filter(v=>v.term && v.translation);
  }

  const lines = text.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
  const out = [];
  let currentCat = "General";
  let currentType = "word";
  let lastItem = null;
  let counter = 1;

  const ignored = [/^unit\s+\d+/i,/^vocabulary\s*词汇/i,/^phrases?\s*\/\s*idioms?/i,/^tip:/i,/^interview vocabulary handout/i];

  function setHeading(line){
    if(/core interview vocabulary/i.test(line)){ currentCat = "Core interview vocabulary"; currentType = "word"; return true; }
    if(/phrases and idioms/i.test(line) || /phrases and idiomatic language/i.test(line)){ currentCat = "Phrases and idioms"; currentType = "idiom"; return true; }
    return false;
  }
  function maybeExample(line){
    if(!lastItem || lastItem.example) return false;
    const looksSentence = /[.!?]/.test(line) || line.includes("/");
    if(!looksSentence) return false;
    if(line.includes("/")){
      const parts = line.split(/\s*\/\s*/);
      if(parts[0]) lastItem.example = parts[0].trim();
      if(parts[1]) lastItem.notes = parts.slice(1).join(" / ").trim();
      return true;
    }
    if(/\s/.test(line)){
      lastItem.example = line.trim();
      return true;
    }
    return false;
  }
  function makeItem(parts){
    const term = String(parts[0]||"").trim();
    const translation = String(parts[1]||"").trim();
    if(!term || !translation) return null;
    const inferredType = parts[2]?.trim() || (currentType === "idiom" ? "idiom" : (term.includes(" ") ? "phrase" : "word"));
    const inferredCategory = parts[3]?.trim() || currentCat;
    return {
      id:`v${counter++}`,
      term,
      translation,
      type: inferredType,
      category: inferredCategory,
      topic: inferredCategory,
      partOfSpeech: "",
      level: inferredType === "word" ? "B1" : "B2",
      difficulty: inferredType === "word" ? 2 : 3,
      distractorGroup: String(inferredCategory || "general").toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"") || "general",
      example: parts[4]?.trim() || "",
      notes: parts[5]?.trim() || ""
    };
  }

  for(const rawLine of lines){
    const line = rawLine.replace(/\u00a0/g, " ").trim();
    if(!line) continue;
    if(setHeading(line)) continue;
    if(ignored.some(rx=>rx.test(line))) continue;
    if(maybeExample(line)) continue;

    let parts = null;
    if(line.includes("\t")){
      parts = line.split("\t").map(x=>x.trim()).filter(Boolean);
    } else if(/[,;|]/.test(line) && /[\u4e00-\u9fff]/.test(line)){
      parts = line.split(/\s*[,;|]\s*/).map(x=>x.trim()).filter(Boolean);
    } else {
      const spaced = line.match(/^(.+?)\s{2,}([\u4e00-\u9fff].+)$/);
      if(spaced) parts = [spaced[1], spaced[2]];
      else if(/[\u4e00-\u9fff]/.test(line)){
        const idx = line.search(/[\u4e00-\u9fff]/);
        const left = line.slice(0, idx).trim();
        const right = line.slice(idx).trim();
        if(left && right) parts = [left, right];
      }
    }

    if(parts && parts.length >= 2){
      const item = makeItem(parts);
      if(item){
        out.push(item);
        lastItem = item;
      }
    }
  }
  return out;
}

function studentCSV(p, vocab){
  const rows = [["term","translation","level","confidence","seen","correct","incorrect","priority"]];
  vocab.forEach(v=>{
    const s = (p.items||{})[v.id] || {};
    rows.push([v.term,v.translation,s.level||"New",Math.round(s.confidence||0),s.seen||0,s.correct||0,s.incorrect||0,s.priority||5]);

  const p = getProfile(); if(!p){toast("No profile"); return;}
  download(p.name+"-progress.csv", studentCSV(p, state.vocab),"text/csv");
  toast("CSV exported");
}
function printReport(){
  const p = getProfile(); if(!p){toast("No profile"); return;}
  openPrintableHtml(printableReport(p, state.vocab), `${p.name}-report`);
}
async function download(filename,text,type){
  const blob = new Blob([text],{type});
  const file = typeof File !== "undefined" ? new File([blob], filename, {type}) : null;
  if(file && navigator.canShare && looksLikeIOS()){
    try{
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title: filename});
        return;
      }
    }catch(err){}
  }
  const url = URL.createObjectURL(blob);
  const a = el("a",{href:url,download:filename});
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}
function openPrintableHtml(html, filename="report"){
  const w = window.open("","_blank");
  if(w){
    w.document.write(html);
    w.document.close();
    setTimeout(()=>w.print(),300);
    return true;
  }
  download(`${filename}.html`, html, "text/html");
  toast("Popup blocked. A printable HTML file has been downloaded instead.");
  return false;
}

   ========================================================= */
let modalCleanup = null;
function openModal({title, body, ok="OK", onOk}){
  closeModal();
  const back = el("div",{class:"modal-backdrop"});
  back.addEventListener("click",(e)=>{ if(e.target===back) closeModal(); });
  const m = el("div",{class:"modal"});
  m.appendChild(el("h2",{},title));
  const bodyWrap = el("div",{});
  m.appendChild(bodyWrap);
  if(body) body(bodyWrap);
  const acts = el("div",{class:"actions"});
  acts.appendChild(el("button",{class:"btn ghost",onclick:closeModal},"Cancel"));
  acts.appendChild(el("button",{class:"btn primary",onclick:()=>{
    const r = onOk? onOk(bodyWrap) : undefined;
    if(r !== false) closeModal();
  }},ok));
  m.appendChild(acts);
  back.appendChild(m);
  document.body.appendChild(back);
  modalCleanup = ()=>back.remove();
}
function closeModal(){ if(modalCleanup){ modalCleanup(); modalCleanup=null; } }

/* =========================================================
   ================       THEME             ===============
   ========================================================= */
function toggleTheme(){
  const cur = document.body.getAttribute("data-theme");
  const next = cur==="dark"?"light":"dark";
  document.body.setAttribute("data-theme",next);
  localStorage.setItem(LS_KEYS.theme,next);
}
function cycleAccent(){
  const cur = document.body.getAttribute("data-accent");
  const i = ACCENT_CYCLE.indexOf(cur);
  const next = ACCENT_CYCLE[(i+1)%ACCENT_CYCLE.length];
  document.body.setAttribute("data-accent",next);
  localStorage.setItem(LS_KEYS.accent,next);
  toast("Accent: "+next);
}
